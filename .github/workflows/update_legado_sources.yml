name: Update Legado Book Sources

on:
  schedule:
    # 每日 UTC 02:00 自动运行
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run update script
        run: python scripts/update_legado_sources.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/novel_downloader/resources/legado_sources/
          if git diff --staged --quiet; then
            echo "书源文件无变化，跳过提交。"
          else
            git commit -m "chore(data): update bundled Legado book sources"
            git push origin HEAD:${{ github.ref_name }}
          fi
